name: Deploy landing page

# ─────────────────────────────────────────────────────────────
# Despliega `landing/` a GitHub Pages.
# El sitio es estático (HTML + CSS + JS sin build step), así que
# solo subimos el directorio como artifact y dejamos que Pages lo
# sirva.
#
# Setup necesario una sola vez en el repo:
#   Settings → Pages → Source: GitHub Actions
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload landing as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./landing

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
