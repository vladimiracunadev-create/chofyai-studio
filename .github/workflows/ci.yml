name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Detectar qué cambió para no correr todo en cada push
  # ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      src: ${{ steps.filter.outputs.src }}
      manifests: ${{ steps.filter.outputs.manifests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - '**.md'
              - 'docs/**'
            src:
              - 'src/**'
              - 'src-tauri/**'
              - 'package.json'
              - 'tsconfig.json'
            manifests:
              - 'apps/**'

  # ─────────────────────────────────────────────
  # Lint de Markdown — usa .markdownlint-cli2.jsonc
  # que excluye archivos ._* (recursos macOS exFAT)
  # ─────────────────────────────────────────────
  lint-docs:
    name: "Lint Markdown"
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown Lint
        uses: davidanson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  # ─────────────────────────────────────────────
  # TypeScript typecheck (sin build real de Tauri)
  # ─────────────────────────────────────────────
  typecheck:
    name: "TypeScript typecheck"
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Frontend unit tests con Vitest
  # ─────────────────────────────────────────────
  test-frontend:
    name: "Vitest (frontend)"
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  # ─────────────────────────────────────────────
  # Backend Rust unit tests con cargo test
  # ─────────────────────────────────────────────
  test-rust:
    name: "cargo test (backend)"
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK/WebKit deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --no-default-features

  # ─────────────────────────────────────────────
  # Validación de manifests YAML
  # Campos siempre requeridos: id, name, category,
  #   runtime, description, platforms, installed_if
  # Campos opcionales: install_script, run,
  #   studio_home_subdir (ComfyUI está en progreso)
  # ─────────────────────────────────────────────
  validate-manifests:
    name: "Validate YAML manifests"
    needs: changes
    if: ${{ needs.changes.outputs.manifests == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate all manifests
        run: |
          python - << 'EOF'
          import yaml, sys, pathlib

          # Campos que SIEMPRE deben estar presentes
          REQUIRED = ["id", "name", "category", "runtime",
                      "description", "platforms", "installed_if"]

          # Si install_script está presente, run también debe estarlo
          CONDITIONAL = {"install_script": "run"}

          VALID_CATEGORIES = {"voice", "asr", "video", "image", "music", "system"}
          VALID_RUNTIMES   = {"python", "binary", "node", "mlx", "mixed"}

          errors = []
          for f in sorted(pathlib.Path("apps").glob("*.yaml")):
              with open(f) as fh:
                  data = yaml.safe_load(fh)

              # Campos requeridos
              for field in REQUIRED:
                  if field not in data:
                      errors.append(f"{f.name}: campo obligatorio faltante: '{field}'")

              # Condicional: si install_script existe, run debe existir
              for trigger, dependent in CONDITIONAL.items():
                  if trigger in data and dependent not in data:
                      errors.append(
                          f"{f.name}: tiene '{trigger}' pero falta '{dependent}'"
                      )

              # Validar valores de categoría y runtime
              if "category" in data and data["category"] not in VALID_CATEGORIES:
                  errors.append(
                      f"{f.name}: category='{data['category']}' no válida "
                      f"(válidas: {sorted(VALID_CATEGORIES)})"
                  )
              if "runtime" in data and data["runtime"] not in VALID_RUNTIMES:
                  errors.append(
                      f"{f.name}: runtime='{data['runtime']}' no válido "
                      f"(válidos: {sorted(VALID_RUNTIMES)})"
                  )

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)

          count = len(list(pathlib.Path("apps").glob("*.yaml")))
          print(f"OK: {count} manifests válidos")
          EOF

  # Nota: secret scanning + dependency audit + CodeQL viven en security.yml
