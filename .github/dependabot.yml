version: 2
updates:
  # El ecosystem "npm" autodetecta pnpm-lock.yaml desde 2023.
  # Se mantiene el nombre por convención de la API de Dependabot.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    groups:
      tauri:
        patterns: ["@tauri-apps/*"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      vitest:
        patterns: ["vitest", "@vitest/*", "jsdom"]

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
